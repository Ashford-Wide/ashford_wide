name: Upgrade NPM packages

on:
  workflow_dispatch:

  schedule:
    - cron:  "0 7 * * *"

jobs:
  upgrade-packages:
    name: Upgrade packages

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Upgrade packages 🔀
        run: npm update

      - name: Check for new install scripts 🔍
        run: |
          output=$(npm approve-scripts --allow-scripts-pending)
          echo "$output"
          if [[ "$output" != "No packages with unreviewed install scripts." ]]; then
            echo "::error::npm update introduced a package with an unreviewed install script. Run 'npm update' locally, review the script with 'npm approve-scripts --allow-scripts-pending', then approve ('npm approve-scripts <pkg>') or deny ('npm deny-scripts <pkg>') it before this workflow can proceed."
            exit 1
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: 'build(deps): Upgrade NPM packages (automated)'
          branch: 'build-deps-upgrade-npm-packages-automated'
          commit-message: 'build(deps): upgrade NPM packages (automated)'
          sign-commits: true