{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="grid grid-3">
      {{ range .Pages.ByDate.Reverse }}
      <a href="{{ .Permalink }}" class="card">
        <div class="card-body">
          <div class="card-meta">{{ .Date.Format "2 January 2006" }}</div>
          <div class="card-title">{{ .Title }}</div>
          <span class="card-link">Read more &rarr;</span>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
