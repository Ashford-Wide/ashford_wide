{{ define "main" }}
<div class="bg-surface text-white py-12">
  <div class="max-w-container mx-auto px-6">
    <h1 class="text-[clamp(1.75rem,4vw,2.5rem)] font-bold">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-2 text-white/70 text-[1.05rem]">{{ . }}</p>{{ end }}
  </div>
</div>
<section class="py-8">
  <div class="max-w-container mx-auto px-6">
    {{ with .Content }}
    <div class="article-content mb-10">{{ . }}</div>
    {{ end }}
    {{ if .Pages }}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      {{ range .Pages.ByDate.Reverse }}
      <a href="{{ .Permalink }}" class="bg-surface text-white rounded overflow-hidden shadow-[0_2px_8px_rgba(0,0,0,0.1)] hover:shadow-[0_0.5rem_1.5rem_rgba(0,0,0,0.2)] transition-all duration-250 hover:-translate-y-[3px] flex flex-col group">
        <div class="p-5 flex-1 flex flex-col">
          <div class="text-[0.78rem] text-white/55 mb-1.5">{{ .Date.Format "2 January 2006" }}</div>
          <div class="text-[1.1rem] font-semibold mb-2 leading-[1.3]">{{ .Title }}</div>
          {{ with .Description }}<div class="text-[0.875rem] text-white/75 line-clamp-3 overflow-hidden">{{ . }}</div>{{ end }}
          <span class="mt-auto pt-4 text-[0.825rem] font-semibold text-white/85 border-b border-white/30 inline-block self-start">Read more &rarr;</span>
        </div>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
