{{ define "head_extra" }}{{ partial "jsonld/webpage.html" . }}{{ end }}
{{ define "main" }}
<div class="bg-surface text-white py-12">
  <div class="max-w-container mx-auto px-6">
    <h1 class="text-[clamp(1.75rem,4vw,2.5rem)] font-bold">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-2 text-white/70 text-[1.05rem]">{{ . }}</p>{{ end }}
  </div>
</div>
<section class="pt-8 pb-16">
  <div class="max-w-[800px] mx-auto px-6">
    <div class="article-content">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
