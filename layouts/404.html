{{ define "main" }}
<div class="bg-surface text-white py-12">
  <div class="max-w-container mx-auto px-6">
    <h1 class="text-h2 font-bold">Page not found</h1>
    <p class="mt-2 text-white/70 text-body-md">The page you're looking for doesn't exist or has been moved.</p>
  </div>
</div>
<section class="py-16">
  <div class="max-w-[800px] mx-auto px-6 text-center">
    <p class="text-display-lg font-bold text-surface/10 leading-none mb-4">404</p>
    <p class="text-body-lg text-muted mb-8">Sorry, we couldn't find what you were looking for. Try heading back to the homepage.</p>
    <a href="/" class="inline-block px-6 py-[0.6rem] rounded text-body-sm font-semibold border-2 border-secondary bg-secondary text-white hover:bg-white hover:text-secondary transition-colors leading-[1.4]">Back to home</a>
  </div>
</section>
{{ end }}
