<header class="sticky top-0 z-50 bg-white shadow-sm h-header border-b-4 border-secondary">
  <div class="max-w-container mx-auto px-6 h-full">
    <div class="flex items-center justify-between h-full">
      <a href="/" class="flex items-center gap-3">
        <img src="/images/logo.svg" alt="Ashford Wide" class="h-10 w-auto">
        <span class="text-body-lg font-bold text-surface leading-[1.2]">Ashford Wide<span class="block text-fine font-normal text-muted">{{ .Site.Params.description }}</span></span>
      </a>

      <nav>
        <ul class="hidden md:flex items-center gap-5" id="main-nav">
          <li class="relative group"><a href="/about" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">About Us</a></li>
          <li class="relative group"><a href="/events" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">Events</a></li>
          {{ if .Site.Params.showRemembrance }}<li class="relative group"><a href="/remembrance-day" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">Remembrance</a></li>{{ end }}
          <li class="relative group"><a href="/news" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">News</a></li>
          <li class="relative group"><a href="/membership" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">Membership</a></li>
          <li class="relative group"><a href="/business-directory" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">Business Directory</a></li>
          <li class="relative group"><a href="/contact" class="text-sm font-semibold text-surface py-1 border-b-2 border-transparent hover:border-surface whitespace-nowrap transition-colors duration-200">Contact Us</a></li>
          <li class="md:hidden mt-2 w-full">
            <a href="/support" class="inline-block w-full text-center bg-secondary text-white px-[1.1rem] py-[0.45rem] rounded text-caption font-bold tracking-[0.03em] hover:opacity-80 transition-opacity">SUPPORT US</a>
          </li>
        </ul>
      </nav>

      <div class="flex items-center gap-4">
        <div itemprop="potentialAction" itemscope itemtype="https://schema.org/DonateAction">
          <a itemprop="url" href="/support" class="hidden md:inline-block bg-secondary text-white px-[1.1rem] py-[0.45rem] rounded text-caption font-bold tracking-[0.03em] hover:opacity-80 transition-opacity whitespace-nowrap">SUPPORT US</a>
        </div>
        <button class="md:hidden flex flex-col gap-[5px] p-2 bg-transparent border-none cursor-pointer" id="nav-toggle" aria-label="Main menu" aria-expanded="false" aria-controls="main-nav">
          <span class="block w-[24px] h-[2px] bg-surface rounded transition-all duration-300"></span>
          <span class="block w-[24px] h-[2px] bg-surface rounded transition-all duration-300"></span>
          <span class="block w-[24px] h-[2px] bg-surface rounded transition-all duration-300"></span>
        </button>
      </div>
    </div>
  </div>
</header>
