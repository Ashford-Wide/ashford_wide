<div itemprop="potentialAction" itemscope itemtype="https://schema.org/JoinAction">
  <a href="{{ .Get "href" | default "/contact" }}"
    itemprop="url"
    class="inline-block no-underline px-6 py-[0.6rem] rounded text-body-sm font-semibold cursor-pointer border-2 border-secondary bg-secondary text-white hover:bg-white hover:text-secondary transition-colors leading-[1.4]">
    <span itemprop="name">{{ .Get "text" | default "Join Us" }}</span>
  </a>
</div>
