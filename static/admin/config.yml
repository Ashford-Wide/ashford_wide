backend:
  name: github
  repo: YOUR_GITHUB_ORG/ashford_wide
  branch: main

media_folder: /assets/images
public_folder: /images

media_libraries:
  stock_assets:
    providers:
      - pexels

omit_empty_optional_fields: true

collections:

  - name: events
    label: Events
    folder: content/events
    create: true
    path: "{{year}}/{{slug}}"
    slug: "{{slug}}"
    view_groups:
      - label: Year
        field: date
        pattern: '^\d{4}'
    fields:
      - { label: Title, name: title, widget: string, maxlength: 60 }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Start Time, name: startTime, widget: string, hint: "24hr format, e.g. 10:00", required: false }
      - { label: End Time, name: endTime, widget: string, hint: "24hr format, e.g. 14:00", required: false }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Organised by, name: organiser, widget: string, hint: "Name of the organising body, if not Ashford Wide", required: false }
      - { label: Organiser URL, name: organiserUrl, widget: string, hint: "Link to the organiser's website or page", required: false }
      - { label: Description, name: description, widget: text, hint: "Short summary shown on event cards", maxlength: 150 }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: news
    label: News
    folder: content/news
    create: true
    path: "{{year}}/{{slug}}"
    slug: "{{slug}}"
    view_groups:
      - label: Year
        field: date
        pattern: '^\d{4}'
    fields:
      - { label: Title, name: title, widget: string, maxlength: 60 }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Author, name: author, widget: string, default: "Ashford Wide Team", required: false }
      - { label: Description, name: description, widget: text, hint: "Short summary shown on news cards", maxlength: 150 }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - label: About
        name: about
        file: content/about.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Membership
        name: membership
        file: content/membership.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Business Membership
        name: business-membership
        file: content/business-membership.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Volunteer
        name: volunteer
        file: content/volunteer.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Support Us
        name: support
        file: content/support.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Contact
        name: contact
        file: content/contact.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

  - name: remembrance
    label: Remembrance
    files:
      - label: Remembrance (main)
        name: remembrance-index
        file: content/remembrance-day/_index.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Order of Services
        name: order-of-services
        file: content/remembrance-day/order-of-services.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Sponsor a Poppy
        name: sponsor-a-poppy
        file: content/remembrance-day/sponsor-a-poppy.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Virtual Poppy Wall
        name: virtual-poppy-wall
        file: content/remembrance-day/virtual-poppy-wall.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

      - label: Road Closures
        name: road-closures
        file: content/remembrance-day/road-closures.md
        fields:
          - { label: Title, name: title, widget: string, maxlength: 60 }
          - { label: Description, name: description, widget: string, maxlength: 150 }
          - { label: Body, name: body, widget: markdown }

  - name: members
    label: Member Logos
    files:
      - label: Members
        name: members
        file: data/members.yaml
        fields:
          - label: Members
            name: members
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Logo, name: logo, widget: image }

  - name: businesses
    label: Business Directory
    files:
      - label: Businesses
        name: businesses
        file: data/businesses.yaml
        fields:
          - label: Businesses
            name: businesses
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Category, name: category, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Website, name: website, widget: string, required: false }
              - { label: Telephone, name: telephone, widget: string, required: false }
              - { label: Mobile, name: mobile, widget: string, required: false }
              - { label: Email, name: email, widget: string, required: false }
              - { label: Address, name: address, widget: string, required: false }
              - { label: Facebook, name: facebook, widget: string, required: false }
              - { label: Instagram, name: instagram, widget: string, required: false }
              - { label: X (Twitter), name: x, widget: string, required: false }
              - { label: Logo, name: logo, widget: image, required: false }
